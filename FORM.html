<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="Reg form">
        <form action="/action_page.php" method="get"></form>
        <form action="/action_page.php" method="post"></form>
        <!--1.The action attribute defines the action to be performed when the form is submitted..
            2.On submit, send the form-data to a file named "action_page.php" (to process the input)
            3.The form-data can be sent as URL variables (with method="get")
            4.This example uses the POST method when submitting the form data:
            5.**NOTE-Always use POST if the form data contains sensitive or personal information**-->
        <form>
            <label for="fname">First name:</label><br>
            <input type="text" id="fname" name="fname"><br>
            <label for="lname">Last name:</label><br>
            <input type="text" id="lname" name="lname"><br>
            <label for="passwd">password:</label><br>
            <input type="password" id="passwd" name="passwd"><br>
            <input type="submit" value="Submit">


            <p>Choose your favorite Web language:</p>
            <input type="radio" id="html" name="fav_language" value="HTML">
            <label for="html">HTML</label><br>
            <input type="radio" id="css" name="fav_language" value="CSS">
            <label for="css">CSS</label><br>
            <input type="radio" id="javascript" name="fav_language" value="JavaScript">
            <label for="javascript">JavaScript</label><br>
            <input type="submit" value="Submit">



            <p>Choose your vehicle type:</p>
            <form>
                <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike">
                <label for="vehicle1"> I have a bike</label><br>
                <input type="checkbox" id="vehicle2" name="vehicle2" value="Car">
                <label for="vehicle2"> I have a car</label><br>
                <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat">
                <label for="vehicle3"> I have a boat</label>
            </form>
            <input type="submit" value="ok">



        </form>
    </div>
</body>

</html>
